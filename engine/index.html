<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes"/>
  <title>Legacy</title>
  <link rel="icon" href="textures/favicon.ico">
  <style>
    :root {
      --bg: #0f1220;
      --card: rgba(255, 255, 255, 0.06);
      --text: #f5f7ff;
      --muted: #a5aacb;
      --accent: #6c7cff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(1200px 600px at 50% -10%, #1a1f4a, var(--bg));
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 3rem 2.5rem;
      border-radius: 20px;
      background: var(--card);
      backdrop-filter: blur(14px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      max-width: 420px;
      width: 100%;
    }

    p {
      font-size: 0.95rem;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .hint {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.5rem;
      opacity: 0.8;
      font-style: italic;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .links a {
      text-decoration: none;
      color: var(--text);
      padding: 0.9rem 1.2rem;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.08);
      transition: all 0.2s ease;
      font-weight: 500;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .links a:hover {
      background: rgba(108, 124, 255, 0.2);
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: var(--muted);
      opacity: 0.7;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="links">
      <a href="/game.html">Game</a>
      <a href="/examples.html">Examples</a>
    </div>
    <footer>
      © 2026 PanzerBanana - Aliyah.Corp
    </footer>
  </div>
</body>
</html>
