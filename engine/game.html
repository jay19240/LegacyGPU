<!DOCTYPE html>
<html lang="fr" style="background-color: #0f1220;">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes"/>
  <link rel="stylesheet" type="text/css" href="styles/core.css">
  <script type="module" src="src/game/main.js"></script>
  <title>Legacy Playground</title>
  <link rel="icon" href="textures/favicon.ico">
  <style>
    @font-face {
      font-family: "Press Start 2P";
      font-style: normal;
      font-weight: 400;
      src: url(../fonts/PressStart2PRegular.otf) format("truetype");
    }

    #TITLE {
      background-color: #656565;
      color: white;
      text-align: center;
      width: 600px;
      font-size: 18px;
      margin: 0 auto;
      margin-top: 2px;
    }

    #TITLE a {
      color: #ffccff;
      text-decoration: unset;
    }

    #LOGO {
      position: fixed;
      top: 10px;
      left: 10px;
      width: 300px;
    }

    #APP {
      margin: 0 auto;
    }

    #UI_ROOT * {
      font-family: "Press Start 2P";
    }

    @media (max-width: 900px) {
      #TITLE {
        margin-top:0;
      }
    }
  </style>
</head>

<body>
  <h1 id="TITLE"><a href="/">Legacy</a> - <a href="/game.html">Playground</a></h1>
  <div id="APP">
    <div id="APP_FAIL"></div>
    <canvas id="CANVAS_3D" width="1px" height="1px"></canvas>
    <canvas id="CANVAS_2D" width="1px" height="1px"></canvas>
    <div id="UI_ROOT"></div>
    <div id="UI_FADELAYER"></div>
    <div id="UI_OVERLAYER"></div>
  </div>
</body>
</html>
